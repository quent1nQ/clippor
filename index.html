<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clippor — An ECO Way to Copy and Paste</title>
    <meta
      name="description"
      content="Clippor 是一款更安静、更优雅的 macOS 剪贴板体验。An ECO Way to Copy and Paste."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="page-glow glow-left"></div>
      <div class="page-glow glow-right"></div>

      <header class="topbar">
        <div class="brand-lockup">
          <img src="./assets/logo/icon1024.png" alt="Clippor logo" class="brand-logo" />
          <span class="brand-name">Clippor</span>
        </div>
        <div class="topbar-note">重新定义 macOS 剪贴板体验</div>
      </header>

      <main class="hero">
        <p class="eyebrow">为安静、专注的工作流而设计</p>
        <h1>
          An ECO Way to<br />
          Copy and Paste
        </h1>
        <p class="hero-copy">
          一种更克制、更优雅的 Mac 剪贴板方式，让复制过的内容始终清晰可见、随时可找、触手可及。
        </p>

        <div class="hero-visual-wrap">
          <div class="hero-halo"></div>
          <img
            src="./assets/images/macbook-hero.png"
            alt="展示 Clippor 应用界面的 MacBook 示意图"
            class="hero-visual"
          />
        </div>

        <section class="feature-strip" aria-label="产品亮点">
          <article class="feature-card">
            <span class="feature-title">原生气质</span>
            <p>贴合 macOS 习惯，轻盈、自然、毫不突兀。</p>
          </article>
          <article class="feature-card">
            <span class="feature-title">快速找回</span>
            <p>通过搜索和可视化历史，迅速回到你刚刚复制的内容。</p>
          </article>
          <article class="feature-card">
            <span class="feature-title">克制设计</span>
            <p>保持专注，不喧闹，却在需要时恰到好处地出现。</p>
          </article>
        </section>
      </main>

      <footer class="footer">
        <span>即将在 Mac App Store 上线</span>
        <a href="https://github.com/quent1nQ/clippor" target="_blank" rel="noreferrer">GitHub</a>
      </footer>
    </div>
  </body>
</html>
